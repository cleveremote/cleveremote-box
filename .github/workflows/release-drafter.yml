name: Release Drafter

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Bump version & create Git tag
  # ─────────────────────────────────────────────
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.new_version.outputs.new_version }}
      env_tags: ${{ steps.get_env.outputs.env_tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Determine bump type from source branch
        id: get_bump
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Merged branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" == fix/* ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH_NAME" == feature/* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH_NAME" == new/* || "$BRANCH_NAME" == breaking/* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        id: new_version
        run: |
          OLD_VERSION="${{ steps.get_tag.outputs.tag }}"
          VERSION=${OLD_VERSION#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          TYPE="${{ steps.get_bump.outputs.type }}"

          case "$TYPE" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Computed new version: $NEW_VERSION"

      - name: Extract env labels from PR
        id: get_env
        # Reads all labels on the PR and keeps only env:* ones.
        # Outputs a JSON array e.g. ["dev","prd","pprd"]
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          ENV_TAGS=$(echo "$LABELS" | jq -c '[.[] | select(startswith("env:")) | ltrimstr("env:")]')
          echo "env_tags=$ENV_TAGS" >> $GITHUB_OUTPUT
          echo "Detected env tags: $ENV_TAGS"

      - name: Create and push Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.new_version.outputs.new_version }}
          git push origin ${{ steps.new_version.outputs.new_version }}

  # ─────────────────────────────────────────────
  # JOB 2 — Create DRAFT release note
  # ─────────────────────────────────────────────
  create-draft-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    needs: bump-version

    steps:
      - uses: release-drafter/release-drafter@v5
        with:
          disable-autolabeler: true
          name: ${{ needs.bump-version.outputs.new_version }}
          tag: ${{ needs.bump-version.outputs.new_version }}
          version: ${{ needs.bump-version.outputs.new_version }}
          publish: false   # ← reste en DRAFT, éditable manuellement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
