name: Release Publisher

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Git à publier (laisser vide pour utiliser le dernier tag)'
        required: false
        default: ''
        type: string
      environments:
        description: 'Environnements cibles (virgule-séparés : dev,prd,pprd,test)'
        required: false
        default: 'dev'
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: cleveremote/clv-box
  CONTAINER_NAME: clv-box
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Résolution du tag et des envs cibles
  # ─────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      env_tags: ${{ steps.resolve.outputs.env_tags }}

    steps:
      - name: Checkout (pour accéder aux métadonnées du tag)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version & env tags
        id: resolve
        run: |
          # Résolution du tag : input ou dernier tag GitHub
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$INPUT_TAG" ]]; then
            VERSION=$(git describe --tags $(git rev-list --tags --max-count=1))
          else
            VERSION="$INPUT_TAG"
          fi

          # Résolution des environnements
          ENVS="${{ github.event.inputs.environments }}"
          if [[ -z "$ENVS" ]]; then
            ENV_TAGS='["dev"]'
          else
            ENV_TAGS=$(echo "$ENVS" | tr ',' '\n' | jq -Rsc 'split("\n") | map(select(length>0))')
          fi
          echo "env_tags=$ENV_TAGS" >> $GITHUB_OUTPUT

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"
          echo "Resolved env tags: $ENV_TAGS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 2 — Publish the draft release
  # ─────────────────────────────────────────────
  publish-release:
    runs-on: ubuntu-latest
    needs: resolve

    steps:
      - name: Publish draft release
        run: gh release edit ${{ needs.resolve.outputs.version }} --draft=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 3 — Build & push image Docker vers ECR
  # ─────────────────────────────────────────────
  deploy:
    name: Build & Push to ECR
    runs-on: self-hosted
    environment: production
    needs: [resolve, publish-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@0e613a0980cbf65ed5b322eb7a1e075d28913a83
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove unsupported credsStore from Docker config
        run: |
          CONFIG=~/.docker/config.json
          if [ -f "$CONFIG" ] && grep -q '"credsStore"' "$CONFIG"; then
            python3 -c "
          import json, sys
          with open('$CONFIG') as f: cfg = json.load(f)
          cfg.pop('credsStore', None)
          with open('$CONFIG', 'w') as f: json.dump(cfg, f, indent=2)
          "
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a

      - name: Build & tag image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.resolve.outputs.version }}
          ENV_TAGS: ${{ needs.resolve.outputs.env_tags }}
        run: |
          IMAGE_BASE="$ECR_REGISTRY/$ECR_REPOSITORY"

          # Tag fixe : version sémantique
          TAGS="-t $IMAGE_BASE:$IMAGE_TAG"

          # Tags d'environnement (multi) depuis le JSON array (sans jq)
          for ENV in $(echo "$ENV_TAGS" | tr -d '[]"' | tr ',' ' '); do
            TAGS="$TAGS -t $IMAGE_BASE:$ENV"
            echo "Adding env tag: $ENV"
          done

          echo "Building with tags: $TAGS"
          docker build $TAGS .

      - name: Push all tags to ECR
        id: push-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.resolve.outputs.version }}
          ENV_TAGS: ${{ needs.resolve.outputs.env_tags }}
        run: |
          IMAGE_BASE="$ECR_REGISTRY/$ECR_REPOSITORY"

          # Push du tag version sémantique
          docker push "$IMAGE_BASE:$IMAGE_TAG"

          # Push de chaque tag d'environnement (sans jq)
          for ENV in $(echo "$ENV_TAGS" | tr -d '[]"' | tr ',' ' '); do
            echo "Pushing env tag: $ENV"
            docker push "$IMAGE_BASE:$ENV"
          done

          echo "image=$IMAGE_BASE:$IMAGE_TAG" >> $GITHUB_OUTPUT
